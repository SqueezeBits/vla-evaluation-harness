# LIBERO Object training-environment benchmark (failure trajectory collection)
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero:latest
  volumes:
    - "/home/data1/junhalee/data/libero_mappings:/home/data1/junhalee/data/libero_mappings:ro"

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.libero_train.benchmark:LIBEROTrainBenchmark"
    subname: libero_train_object
    mode: sync
    episodes_per_task: 1
    params:
      suite: libero_object
      mapping_file: "/home/data1/junhalee/data/libero_mappings/libero_object_mapping.json"
      seed: 7
      num_steps_wait: 10
