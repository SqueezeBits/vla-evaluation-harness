# LIBERO-10 training-environment benchmark (failure trajectory collection)
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero:latest
  volumes:
    - "/home/data1/junhalee/data:/home/data1/junhalee/data:ro"

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.libero_train.benchmark:LIBEROTrainBenchmark"
    subname: libero_train_10
    mode: sync
    episodes_per_task: 1
    params:
      suite: libero_10
      mapping_file: "/home/data1/junhalee/data/libero_mappings/libero_10_mapping.json"
      seed: 7
      num_steps_wait: 10
